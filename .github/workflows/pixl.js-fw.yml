name: pixl.js-fw

on:
  push:
    branches: [ "main", "develop", "neo_v2" ]
    tags: [ "*" ]
  pull_request:
    types: [ "opened" ]
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        board: [ "LCD", "OLED" ]

    runs-on: ubuntu-latest
    container: solosky/nrf52-sdk:latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Change Owner of Container Working Directory
        run: chown -R root:root .

      - name: Patch pixl.js RAM settings
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          makefile = Path("fw/application/Makefile")
          text = makefile.read_text()

          text = re.sub(
              r"pixljs: CFLAGS \+= -D__HEAP_SIZE=\d+",
              "pixljs: CFLAGS += -D__HEAP_SIZE=2048",
              text,
          )
          text = re.sub(
              r"pixljs: CFLAGS \+= -D__STACK_SIZE=\d+",
              "pixljs: CFLAGS += -D__STACK_SIZE=8192",
              text,
          )
          text = re.sub(
              r"pixljs: ASMFLAGS \+= -D__HEAP_SIZE=\d+",
              "pixljs: ASMFLAGS += -D__HEAP_SIZE=2048",
              text,
          )
          text = re.sub(
              r"pixljs: ASMFLAGS \+= -D__STACK_SIZE=\d+",
              "pixljs: ASMFLAGS += -D__STACK_SIZE=8192",
              text,
          )

          makefile.write_text(text)

          sdk_config = Path("fw/application/config/sdk_config.h")
          text = sdk_config.read_text()
          text = re.sub(
              r"#define NRF_LOG_ENABLED\s+\d+",
              "#define NRF_LOG_ENABLED 0",
              text,
          )
          sdk_config.write_text(text)
          PY

          grep -n "__HEAP_SIZE\|__STACK_SIZE" fw/application/Makefile
          grep -n "#define NRF_LOG_ENABLED" fw/application/config/sdk_config.h

      - name: Patch ChameleonUltra for 99 slots
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          tag_emulation = Path("fw/components/chameleon-ultra/firmware/application/src/rfid/nfctag/tag_emulation.h")
          tag_persistence = Path("fw/components/chameleon-ultra/firmware/application/src/rfid/nfctag/tag_persistence.c")

          if not tag_emulation.exists():
              raise SystemExit(f"Missing file: {tag_emulation}")

          if not tag_persistence.exists():
              raise SystemExit(f"Missing file: {tag_persistence}")

          text = tag_emulation.read_text()

          text = re.sub(
              r"#define\s+TAG_MAX_SLOT_NUM\s+\d+",
              "#define TAG_MAX_SLOT_NUM    99",
              text,
          )
          text = re.sub(
              r"#define\s+TAG_SLOT_CONFIG_CURRENT_VERSION\s+\d+",
              "#define TAG_SLOT_CONFIG_CURRENT_VERSION 9",
              text,
          )
          text = re.sub(
              r"#define\s+TAG_SLOT_CONFIG_CURRENT_SIZE\s+.*",
              "#define TAG_SLOT_CONFIG_CURRENT_SIZE 8*99+4",
              text,
          )

          tag_emulation.write_text(text)

          text = tag_persistence.read_text()

          if '#include "tag_emulation.h"' not in text:
              text = text.replace(
                  '#include "tag_persistence.h"\n',
                  '#include "tag_persistence.h"\n#include "tag_emulation.h"\n',
                  1,
              )

          if '#include "app_error.h"' not in text:
              if '#include "fds_ids.h"\n' in text:
                  text = text.replace(
                      '#include "fds_ids.h"\n',
                      '#include "fds_ids.h"\n#include "app_error.h"\n',
                      1,
                  )
              else:
                  text = text.replace(
                      '#include "tag_persistence.h"\n',
                      '#include "tag_persistence.h"\n#include "app_error.h"\n',
                      1,
                  )

          text = re.sub(
              r"\(sense_type\s*==\s*TAG_SENSE_NO\)\s*\|\|\s*\(slot\s*>\s*\d+\)",
              "(sense_type == TAG_SENSE_NO) || (slot >= TAG_MAX_SLOT_NUM)",
              text,
          )

          tag_persistence.write_text(text)
          PY

          grep -n "TAG_MAX_SLOT_NUM\|TAG_SLOT_CONFIG_CURRENT_VERSION\|TAG_SLOT_CONFIG_CURRENT_SIZE" fw/components/chameleon-ultra/firmware/application/src/rfid/nfctag/tag_emulation.h
          grep -n "tag_emulation.h\|app_error.h\|TAG_MAX_SLOT_NUM\|slot >" fw/components/chameleon-ultra/firmware/application/src/rfid/nfctag/tag_persistence.c

      - name: Build firmware
        run: cd fw && make all RELEASE=1 APP_VERSION=$GITHUB_RUN_NUMBER BOARD=${{ matrix.board }}

      - name: Copy artifact
        run: |
          mv fw/_build/bootloader.hex .
          mv fw/_build/pixljs.hex .
          mv fw/_build/pixljs_all.hex .
          mv fw/_build/pixjs_ota_v${{ github.run_number }}.zip .
          mv fw/docs/fw_readme.txt .
          mv fw/scripts/fw_update.bat .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixljs_fw_${{ matrix.board }}
          path: |
            bootloader.hex
            pixljs.hex
            pixljs_all.hex
            pixjs_ota_v${{ github.run_number }}.zip
            fw_readme.txt
            fw_update.bat
